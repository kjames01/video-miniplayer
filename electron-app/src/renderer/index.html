<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline';">
  <title>Window Manager</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <!-- Title Bar -->
    <div id="title-bar">
      <div class="title-text">Window Manager</div>
      <div class="window-controls">
        <button id="refresh-btn" class="control-btn" title="Refresh (F5)">&#x21bb;</button>
        <button id="pin-btn" class="control-btn" title="Always on Top">&#x1F4CC;</button>
        <button id="minimize-btn" class="control-btn" title="Minimize">&#x2500;</button>
        <button id="close-btn" class="control-btn close" title="Close">&#x2715;</button>
      </div>
    </div>

    <!-- Search & Count -->
    <div id="toolbar">
      <input type="text" id="search-input" placeholder="Filter windows..." autocomplete="off">
      <span id="window-count">0 windows</span>
    </div>

    <!-- Window List -->
    <div id="window-list"></div>

    <!-- Resize Panel -->
    <div id="resize-panel" class="hidden">
      <div class="panel-header">
        <span id="selected-window-title">Window Title</span>
        <button id="close-panel-btn" class="panel-close">&#x2715;</button>
      </div>
      <div id="current-size"></div>
      <div class="resize-presets" id="resize-presets"></div>
      <div class="custom-resize">
        <input type="number" id="custom-width" placeholder="Width" min="100" max="7680">
        <span class="resize-x">x</span>
        <input type="number" id="custom-height" placeholder="Height" min="50" max="4320">
        <button id="apply-resize-btn">Apply</button>
      </div>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
